name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci-checks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Code Quality (Linting)
      run: |
        ruff check src/ tests/
        black --check src/ tests/

    - name: Run Tests & Data Quality Suite
      run: |
        pytest -o pythonpath=. -v --cov=src tests/

    - name: Validate Docker Build
      run: |
        docker build -t church-calendar-serving:test .

    - name: Security Scan (Container & Dependencies)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'church-calendar-serving:test'
        format: 'table'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'

    - name: Validate Helm Chart
      run: |
        # Instalar helm no runner
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        # Validar estrutura do Helm Chart
        helm lint charts/church-calendar
        # Validar renderização dos templates manifestos
        helm template test-release charts/church-calendar --debug

